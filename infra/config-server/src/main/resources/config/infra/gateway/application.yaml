spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      default-filters:
        - PrefixPath=/api/v1

      routes:
        - id: shopping_cart_service_route
          uri: lb://shopping-cart
          predicates:
            - Path=/shopping-cart/**

        - id: shopping_store_service_route
          uri: lb://shopping-store
          predicates:
            - Path=/shopping-store/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: NOT_FOUND
                methods: GET

        - id: warehouse_service_route
          uri: lb://warehouse
          predicates:
            - Path=/warehouse/**

server:
  port: 8080