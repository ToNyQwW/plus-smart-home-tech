spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/analyzer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    sql:
      init:
        mode: always

kafka:
  consumers:
    snapshotConsumer:
      properties:
        "bootstrap.servers": localhost:9092
        "key.deserializer": "org.apache.kafka.common.serialization.StringDeserializer"
        "value.deserializer": "ru.yandex.practicum.kafka.deserializer.SensorsSnapshotDeserializer"
        "group.id": "telemetry.analyzer.snapshot"
        "enable.auto.commit": false
      topic: "telemetry.snapshots.v1"
      poll-timeout: 500ms
    hubEventConsumer:
      properties:
        "bootstrap.servers": localhost:9092
        "key.deserializer": "org.apache.kafka.common.serialization.StringDeserializer"
        "value.deserializer": "ru.yandex.practicum.kafka.deserializer.HubEventDeserializer"
        "group.id": "telemetry.analyzer.hub"
        "enable.auto.commit": false
      topic: "telemetry.hubs.v1"
      poll-timeout: 2000ms

grpc:
  client:
    hub-router:
      address: 'static://localhost:59090'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext